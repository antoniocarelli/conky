-- Conky Configuration for Vertical Graphics Panel
-- ================================================

conky.config = {
    -- Conky settings
    -- Fills the X11 window background with own_window_colour before Conky’s draw cycle (compositor hint).
    -- The visible panel colour is set in conky.lua as `painelCorFundo` (Lua repaints the whole client area).
    background = true,
    update_interval = 1,

    cpu_avg_samples = 2,
    net_avg_samples = 2,

    override_utf8_locale = true,

    double_buffer = true,
    -- When true, Conky avoids the X double-buffer extension; that can interact badly with Cairo + compositor.
    no_buffers = false,

    text_buffer_size = 32768,
    imlib_cache_size = 0,

    -- Window specifications
    own_window = true,
    -- 'dock' is often treated as a panel (less dimming than 'normal' on some compositors).
    own_window_type = 'dock',
    own_window_class = 'VertSysMon',
    own_window_title = 'graficos-verticais',
    -- False = plain RGB X11 window (no ARGB). Fixes “veil” on GNOME/XWayland where ARGB + compositor
    -- blends wrong. True only if you need per-pixel transparency from Lua.
    own_window_argb_visual = false,
    own_window_hints = 'undecorated,sticky,skip_taskbar,skip_pager,below',
    -- Keep equal to `painelCorFundo` in conky.lua so the X11 backing store matches (little visible change if Lua runs).
    own_window_colour = '#1e2024',
    -- With a full-screen Lua paint, toggling this rarely changes the look; false avoids root showing through gaps.
    own_window_transparent = false,
    out_to_x = true,
    out_to_wayland = false,

    -- Multi-monitor (X11 / XWayland): which RandR/Xinerama head Conky attaches to. First head = 0.
    -- Monitor 1 (primary):   xinerama_head = 0,
    -- Monitor 2 (secondary): xinerama_head = 1,
    xinerama_head = 0,

    -- Position: top-left corner of that head (gap_x / gap_y are relative to the head origin)
    alignment = 'tl',
    gap_x = 10,
    gap_y = 50,

    minimum_width = 370,
    minimum_height = 1000,

    border_inner_margin = 0,
    border_outer_margin = 0,

    -- Graphics settings
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,

    -- Text settings
    use_xft = true,
    font = 'Roboto Medium:size=14',
    xftalpha = 1.0,
    uppercase = false,
    default_color = '#FFFFFF',

    -- Lua: set lua_load to the absolute path of conky.lua on this machine
    -- (relative paths depend on the process working directory).
	lua_load = '/home/antonio/codes/conky/graficos-verticais/conky.lua',
    -- Post: Cairo survives Conky's own draw pass (empty conky.text still clears the buffer on some builds).
    lua_draw_hook_post = 'conky_main',
}

-- Lua module for rendering
conky.text = [[
]];
